services:
  - type: web
    name: synapse-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/api/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: APP_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
